<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Agent Skills | Directory</title>
    <meta name="description" content="The Ultimate Open-Source Library of Prompts & Agentic Workflows">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="brand-logo">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5m-10-5v10" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div class="brand-text">
                    <h1>Agent Skills</h1>
                    <span>Registry v2.0</span>
                </div>
            </div>

            <nav class="categories-nav" id="categories-nav">
                <!-- Categories injected here -->
            </nav>

            <div class="sidebar-footer">
                <a href="https://github.com/mayurrathi/awesome-agent-skills" target="_blank" class="github-link">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    GitHub Source
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Sticky Header Search -->
            <header class="top-header">
                <div class="search-container">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="search-icon">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                    <input type="text" id="search-input"
                        placeholder="Search prompts, categories, or keywords... (Press '/' to focus)"
                        autocomplete="off">
                    <div class="search-shortcut">/</div>
                </div>
            </header>

            <!-- Skills Dashboard -->
            <div class="dashboard">
                <div class="dashboard-header">
                    <h2>Explore Skills</h2>
                    <p id="skill-count-label">Loading registry...</p>
                </div>

                <div id="skills-grid" class="skills-grid">
                    <!-- Cards injected here -->
                    <div class="loading-state">Building Skill Map...</div>
                </div>

                <div id="no-results" class="no-results hidden">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                        <path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <h3>No skills found</h3>
                    <p>Try searching for different keywords or clear the filter.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Skill Detail Layout (Hidden by default) -->
    <div id="skill-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <header class="modal-header">
                <div class="modal-title-group">
                    <span id="modal-category" class="tag">Category</span>
                    <h2 id="modal-title">Skill Name</h2>
                </div>
                <div class="modal-actions">
                    <button id="copy-prompt-btn" class="btn primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2" />
                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                        Copy Prompt
                    </button>
                    <button class="close-modal-btn" id="close-modal-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
            </header>
            <div class="modal-body">
                <p id="modal-description" class="modal-desc"></p>
                <div class="code-container">
                    <pre><code id="modal-prompt" class="language-markdown"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Marked.js for markdown parsing in modals -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
